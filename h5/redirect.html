<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>链接跳转</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0a0a0f;
      --bg-surface: #12121a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.3);
      --accent: #00d4aa;
      --accent-glow: rgba(0, 212, 170, 0.4);
      --error: #ff4757;
      --error-glow: rgba(255, 71, 87, 0.3);
      --success: #00d4aa;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Background effects */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      transition: all 0.8s ease;
    }

    .bg-glow-1 {
      top: -200px;
      right: -200px;
      background: var(--accent);
    }

    .bg-glow-2 {
      bottom: -200px;
      left: -200px;
      background: #6366f1;
    }

    .bg-glow.error-mode {
      background: var(--error) !important;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      padding: 24px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    /* States */
    .state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: stateIn 0.4s ease-out;
    }

    .state.active {
      display: flex;
    }

    @keyframes stateIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Loading State */
    .loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .loader-ring {
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-ring:nth-child(2) {
      inset: 8px;
      border-top-color: transparent;
      border-right-color: var(--accent);
      animation-duration: 1.5s;
      animation-direction: reverse;
      opacity: 0.6;
    }

    .loader-ring:nth-child(3) {
      inset: 16px;
      border-top-color: var(--accent);
      border-right-color: transparent;
      animation-duration: 2s;
      opacity: 0.3;
    }

    .loader-core {
      position: absolute;
      inset: 24px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.2;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.2; }
      50% { transform: scale(1); opacity: 0.4; }
    }

    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* Icon containers */
    .icon-container {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-container.success {
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.2);
    }

    .icon-container.error {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.2);
    }

    .icon-container svg {
      width: 32px;
      height: 32px;
      stroke-width: 2;
    }

    .icon-container.success svg {
      stroke: var(--success);
    }

    .icon-container.error svg {
      stroke: var(--error);
    }

    /* Typography */
    .title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: -8px;
    }

    .message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 260px;
    }

    /* URL display */
    .url-display {
      background: var(--bg-surface);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      margin-top: 8px;
    }

    .url-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .url-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      word-break: break-all;
      line-height: 1.5;
    }

    /* Button */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--accent);
      color: var(--bg-deep);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.5;
    }

    /* Footer hint */
    .footer-hint {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1s forwards;
    }

    .footer-hint kbd {
      display: inline-block;
      background: var(--bg-surface);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="card">
      <!-- Loading State -->
      <div id="loadingState" class="state active">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-core"></div>
        </div>
        <p class="loading-text">正在跳转<span class="loading-dots"></span></p>
      </div>

      <!-- Error State -->
      <div id="errorState" class="state">
        <div class="icon-container error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <h2 class="title">无法跳转</h2>
        <p id="errorMessage" class="message">链接不在允许范围内</p>
      </div>

      <!-- Success State -->
      <div id="successState" class="state">
        <div class="icon-container success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="16 10 11 15 8 12"/>
          </svg>
        </div>
        <h2 class="title">准备就绪</h2>
        <p class="message">点击下方按钮在浏览器中打开链接</p>
        <div class="url-display">
          <div class="url-label">Target URL</div>
          <div id="targetUrlDisplay" class="url-text"></div>
        </div>
        <a id="openBtn" class="btn-primary" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          在浏览器打开
        </a>
      </div>
    </div>
  </div>

  <div class="footer-hint">
    安全跳转 · 域名白名单校验
  </div>

  <script>
    (function() {
      'use strict'

      // DOM Elements
      const loadingState = document.getElementById('loadingState')
      const errorState = document.getElementById('errorState')
      const successState = document.getElementById('successState')
      const errorMessage = document.getElementById('errorMessage')
      const targetUrlDisplay = document.getElementById('targetUrlDisplay')
      const openBtn = document.getElementById('openBtn')
      const bgGlows = document.querySelectorAll('.bg-glow')

      /**
       * Get URL parameter
       */
      function getUrlParam(name) {
        const urlParams = new URLSearchParams(window.location.search)
        return urlParams.get(name)
      }

      /**
       * Switch state with animation
       */
      function showState(state) {
        const states = { loading: loadingState, error: errorState, success: successState }

        Object.values(states).forEach(el => el.classList.remove('active'))

        // Add error mode to background glows
        bgGlows.forEach(glow => {
          glow.classList.toggle('error-mode', state === 'error')
        })

        setTimeout(() => {
          states[state].classList.add('active')
        }, 50)
      }

      /**
       * Show error state
       */
      function showError(message) {
        errorMessage.textContent = message
        showState('error')
      }

      /**
       * Show success state with button
       */
      function showSuccess(url) {
        targetUrlDisplay.textContent = url
        openBtn.href = url
        showState('success')
      }

      /**
       * Load whitelist
       */
      async function loadWhitelist() {
        try {
          const response = await fetch('./whitelist.json')
          if (!response.ok) {
            throw new Error('Failed to load whitelist')
          }
          return await response.json()
        } catch (err) {
          console.error('Failed to load whitelist:', err)
          return []
        }
      }

      /**
       * Check if domain is in whitelist
       */
      function isDomainAllowed(url, whitelist) {
        try {
          const urlObj = new URL(url)
          const hostname = urlObj.hostname
          return whitelist.includes(hostname)
        } catch (err) {
          console.error('URL parse error:', err)
          return false
        }
      }

      /**
       * Attempt auto-redirect
       */
      function tryAutoJump(url) {
        try {
          // Try direct navigation
          window.location.href = url

          // If still on page after delay, show button
          setTimeout(function() {
            showSuccess(url)
          }, 1500)
        } catch (err) {
          console.error('Auto jump failed:', err)
          showSuccess(url)
        }
      }

      /**
       * Main function
       */
      async function main() {
        // 1. Get target URL
        const targetUrl = getUrlParam('t')

        if (!targetUrl) {
          showError('缺少目标链接参数')
          return
        }

        console.log('Target URL:', targetUrl)

        // 2. Load whitelist
        const whitelist = await loadWhitelist()
        console.log('Whitelist:', whitelist)

        // 3. Validate domain
        if (!isDomainAllowed(targetUrl, whitelist)) {
          showError('链接不在允许范围内')
          return
        }

        // 4. Attempt auto-redirect
        tryAutoJump(targetUrl)
      }

      // Start
      main()
    })()
  </script>
</body>
</html>
